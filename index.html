<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKT DIGITAL - Services</title>
    <style>
        /* आपका ओरिजिनल स्टाइल बिना किसी बदलाव के */
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        :root { 
            --light-green: #90EE90; 
            --green-shadow: #76c776; 
            --dark-bg: #1a1a1a; 
            --ad-black: #000000; 
            --white-bg: #ffffff; 
            --text-color: #000000;
            --card-bg: #ffffff;
        }

        body.night-mode {
            --white-bg: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --dark-bg: #000000;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--white-bg); 
            color: var(--text-color);
            overflow-x: hidden; 
        }

        /* लोकेशन सिलेक्टर का नया स्टाइल - ओरिजinal थीम के साथ मैच करता हुआ */
        .location-selector {
            background: var(--dark-bg);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 4px solid var(--light-green);
        }
        .select-box {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--light-green);
            background: var(--card-bg);
            color: var(--text-color);
            font-weight: bold;
            min-width: 150px;
        }

        .site-branding {
            background-color: var(--dark-bg);
            color: var(--light-green);
            text-align: center;
            padding: 20px 0;
            border-bottom: 4px solid var(--light-green);
            text-transform: uppercase;
            animation: fastHeartBeat 0.8s ease-in-out infinite;
            display: block;
        }
        .branding-title { font-size: clamp(32px, 10vw, 48px); font-weight: 950; margin: 0; }
        .branding-subtitle { font-size: 18px; font-weight: 800; display: block; letter-spacing: 6px; color: #fff; }

        .ad-container { background-color: var(--ad-black); border-top: 5px solid var(--light-green); border-bottom: 5px solid var(--light-green); width: 100%; }
        .ad-banner { padding: 15px 0 5px 0; overflow: hidden; display: flex; }
        .ad-text { display: inline-block; white-space: nowrap; animation: moveLeft 20s linear infinite; font-size: 18px; font-weight: 900; color: var(--light-green); }
        @keyframes moveLeft { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .ad-static-actions { 
            background-color: var(--ad-black); 
            text-align: center; padding: 10px 0 20px 0; 
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; 
        }
        .ad-static-btn { 
            background-color: var(--light-green); color: #000; padding: 10px 15px; 
            border-radius: 50px; text-decoration: none; font-size: 13px; font-weight: 900; 
            text-transform: uppercase; box-shadow: 0 4px 0 var(--green-shadow); border: none; cursor: pointer;
        }

        .mode-btn { background-color: #f1f1f1; }
        body.night-mode .mode-btn { background-color: #333; color: #fff; box-shadow: 0 4px 0 #000; }
        .form-btn { background-color: #673ab7 !important; color: white !important; animation: fastHeartBeat 0.8s ease-in-out infinite; }

        .main-header { text-align: center; background-color: var(--light-green); padding: 25px 0 10px 0; margin: 0; width: 100%; color: #000; }
        .main-title { font-size: clamp(30px, 8vw, 50px); font-weight: 900; margin: 0; animation: fastHeartBeat 0.8s ease-in-out infinite; }
        .main-subtitle { font-size: 16px; font-weight: 800; color: #333; letter-spacing: 2px; }

        @keyframes fastHeartBeat { 0%, 28%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.08); } }

        .visitor-counter {
            background: var(--dark-bg);
            color: var(--light-green);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 3px solid var(--light-green);
            font-weight: 900;
            font-size: 14px;
        }
        .counter-box img { 
            height: 25px; 
            border: 1px solid var(--light-green); 
            border-radius: 4px; 
            vertical-align: middle;
        }

        .new-marquee-ad { background-color: #f1f1f1; padding: 12px 0; border-bottom: 3px solid var(--light-green); overflow: hidden; display: flex; white-space: nowrap; color: #333; }
        body.night-mode .new-marquee-ad { background-color: #333; color: #fff; }
        .marquee-content { display: inline-block; animation: moveLeft 15s linear infinite; font-size: 16px; font-weight: 800; }

        .nav-container { background-color: var(--dark-bg); padding: 20px 0; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; border-bottom: 4px solid var(--light-green); overflow-x: auto; padding-left: 10px; }
        .tab-btn { font-size: 16px; padding: 12px 20px; font-weight: 900; cursor: pointer; border: none; border-radius: 50px; background-color: var(--light-green); box-shadow: 0 6px 0 var(--green-shadow); white-space: nowrap; }
        .tab-btn.active { background-color: #fff; color: #000; transform: translateY(4px); box-shadow: 0 2px 0 var(--green-shadow); }

        .container { padding: 15px; max-width: 1100px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        .list-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 6px solid var(--light-green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; margin-bottom: 15px; }
        .list-card h3 { color: var(--light-green); border-bottom: 1px solid #444; padding-bottom: 5px; }
        .shared-highlight { border: 8px solid #FFD700 !important; box-shadow: 0 0 25px rgba(255, 215, 0, 0.7) !important; transform: scale(1.05); }

        .rate-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 6px solid var(--light-green); margin-bottom: 20px; }
        .search-bar { width: 100%; padding: 18px; margin-bottom: 25px; border-radius: 50px; border: 4px solid var(--light-green); font-size: 18px; font-weight: bold; background: var(--card-bg); color: var(--text-color); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .action-btn { font-size: 11px; padding: 12px 2px; text-decoration: none; color: #000; border-radius: 50px; text-align: center; font-weight: 900; background-color: var(--light-green); box-shadow: 0 4px 0 var(--green-shadow); text-transform: uppercase; border: none; }
    </style>
</head>
<body>

<div class="site-branding">
    <div class="branding-title">💎 CKT DIGITAL</div>
    <span class="branding-subtitle">SERVICE</span>
</div>

<div class="location-selector">
    <select id="stateSelect" class="select-box" onchange="updateDistricts()">
        <option value="">राज्य चुनें (State)</option>
    </select>
    <select id="districtSelect" class="select-box">
        <option value="">ज़िला चुनें (District)</option>
    </select>
</div>

<div class="ad-container">
    <div class="ad-banner"><div class="ad-text">🚀 विज्ञापन: भारत की नंबर 1 शॉप डायरेक्टरी - बेस्ट सर्विस और बेस्ट रेट | संपर्क करें: +91 7908955101 🚀</div></div>
    <div class="ad-static-actions">
        <a href="tel:7908955101" class="ad-static-btn">📞 CALL</a>
        <button class="ad-static-btn mode-btn" onclick="toggleNightMode()" id="modeBtn">🌙 NIGHT</button>
        <a href="https://wa.me/917908955101" class="ad-static-btn">💬 WHATSAPP</a>
        <a href="#" target="_blank" class="ad-static-btn form-btn">📝 ADD YOUR SHOP</a>
        <button onclick="shareMain()" class="ad-static-btn">📤 SHARE SITE</button>
    </div>
</div>

<div class="main-header">
    <h1 class="main-title" id="locationDisplay">INDIA</h1>
    <div class="main-subtitle">SHOPS & SERVICES</div>
</div>

<div class="visitor-counter">
    <p style="margin:0">TOTAL FOOTFALL:</p>
    <div class="counter-box">
        <img src="https://counter9.stat.ovh/private/freecounterstat.php?c=89mj8m1w5w727m616lyq2v269v2k253m" border="0" alt="website counter">
    </div>
</div>

<div class="nav-container" id="tabMenu"></div>
<div class="container" id="contentArea"></div>

<script>
    // भारत के राज्यों और जिलों का डेटा
    const indiaData = {
        "West Bengal": ["Paschim Medinipur", "Kharagpur", "Kolkata", "Howrah"],
        "Bihar": ["Patna", "Gaya", "Muzaffarpur", "Bhagalpur"],
        "Uttar Pradesh": ["Lucknow", "Kanpur", "Varanasi", "Noida"],
        "Delhi": ["New Delhi", "North Delhi", "South Delhi"]
        // आप यहाँ और भी राज्य और जिले जोड़ सकते हैं
    };

    function initLocation() {
        const stateSelect = document.getElementById('stateSelect');
        for (let state in indiaData) {
            let opt = document.createElement('option');
            opt.value = state;
            opt.innerHTML = state;
            stateSelect.appendChild(opt);
        }
    }

    function updateDistricts() {
        const state = document.getElementById('stateSelect').value;
        const districtSelect = document.getElementById('districtSelect');
        const locationDisplay = document.getElementById('locationDisplay');
        
        districtSelect.innerHTML = '<option value="">ज़िला चुनें (District)</option>';
        
        if (state) {
            locationDisplay.innerText = state.toUpperCase();
            indiaData[state].forEach(dist => {
                let opt = document.createElement('option');
                opt.value = dist;
                opt.innerHTML = dist;
                districtSelect.appendChild(opt);
            });
        } else {
            locationDisplay.innerText = "INDIA";
        }
    }

    // बाकी सारा पुराना लॉजिक वैसा ही रहेगा
    const shopData = {}; // यहाँ आपका saloonData, autoData आदि का डेटा आएगा

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
        const btn = document.getElementById('modeBtn');
        btn.innerHTML = document.body.classList.contains('night-mode') ? "☀️ LIGHT" : "🌙 NIGHT";
    }

    window.onload = function() {
        initLocation();
        // init(); // आपकी पुरानी डेटा लोडिंग यहाँ कॉल होगी
    };

    function shareMain() {
        const text = "CKT Digital - भारत की लोकल सर्विसेज यहाँ देखें:";
        window.open(`https://wa.me/?text=${encodeURIComponent(text + " " + window.location.href)}`, '_blank');
    }
</script>
</body>
</html>
